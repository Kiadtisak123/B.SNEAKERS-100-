<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | B.Sneakers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --dark: #0a0a0a; --card-bg: #1a1a1a; --text: #f0f0f0; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--dark); color: var(--text); display: flex; min-height: 100vh; }
        aside { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 20px; position: fixed; height: 100%; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 40px; text-align: center; display: block; }
        .logo span { color: var(--primary); }
        .menu-item { padding: 12px 15px; color: #aaa; background: none; border: none; width: 100%; text-align: left; cursor: pointer; display: block; text-decoration: none; margin-bottom: 10px; }
        .menu-item.active { background: var(--primary); color: white; border-radius: 8px; }
        main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; margin-top: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
        .btn-appsheet { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .btn-appsheet:hover { background: #1976D2; transform: translateY(-2px); }
    </style>
</head>
<body>
    <aside>
        <div class="logo">B.<span>SNEAKERS</span></div>
        <a href="#" class="menu-item active"><i class="fas fa-boxes-stacked"></i> ตรวจสอบสต็อก</a>
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i> กลับหน้าหลัก</a>
    </aside>
    <main>
        <h1>จัดการสต็อกสินค้า</h1>
        <a href="https://www.appsheet.com/start/2e307576-b652-4cb3-b92a-0bd98038f77a" target="_blank" class="btn-appsheet">
            <i class="fas fa-external-link-alt"></i> เปิด AppSheet เพื่อเพิ่ม/แก้ไขสินค้า
        </a>
        <div class="card">
            <table>
                <thead><tr><th>สินค้า</th><th>ราคา</th><th>สต็อก</th></tr></thead>
                <tbody id="stockBody"><tr><td colspan="3">กำลังโหลดข้อมูล...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
    // แก้ไขลิงก์ Apps Script ตัวใหม่ล่าสุดที่เชื่อมกับชีท "products"
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxgV7RVwyXcMB6lHb6vTv-wGwoiz9guy_g5e38kGj3AUIil1s1snlsWbnx9yrFJd_p3ZQ/exec";

    async function loadProducts() {
        try {
            const res = await fetch(`${GOOGLE_SHEET_URL}?t=${new Date().getTime()}`);
            const data = await res.json();
            const tbody = document.getElementById('stockBody');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">ไม่พบข้อมูลสินค้าใน Google Sheets</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(p => {
                const img = p.image_url ? p.image_url.split(',')[0].trim() : 'https://via.placeholder.com/50';
                const price = Number(String(p.price || '0').replace(/[^0-9.]/g, '')).toLocaleString();
                
                return `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <img src="${img}" 
                                     onerror="this.src='https://via.placeholder.com/50'"
                                     style="width:50px; height:50px; object-fit:cover; border-radius:4px; background:#222;">
                                <div>
                                    <div style="font-weight:600;">${p.name || '-'}</div>
                                    <div style="font-size:11px; color:#888;">ID: ${p.id || '-'}</div>
                                </div>
                            </div>
                        </td>
                        <td style="color:#e60023; font-weight:600;">฿${price}</td>
                        <td>
                            <span style="background:${p.stock > 0 ? '#2e7d32' : '#c62828'}; padding:4px 8px; border-radius:4px; font-size:12px;">
                                ${p.stock || 0} คู่
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (e) {
            console.error(e);
            document.getElementById('stockBody').innerHTML = '<tr><td colspan="3" style="color:red; text-align:center;">❌ โหลดข้อมูลสต็อกไม่สำเร็จ (โปรดเช็คสิทธิ์ API)</td></tr>';
        }
    }
    loadProducts();
</script>
</body>
</html>

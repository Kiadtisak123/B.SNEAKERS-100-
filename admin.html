<script>
    // URL ที่ได้จาก Deploy
    const GOOGLE_SHEET_URL = "ใส่ URL ของคุณที่นี่"; 
    
    // 1. โหลดข้อมูลจาก Google Sheets (ระบุแท็บ products)
    async function loadProducts() {
        try {
            // เพิ่ม ?sheet=products ต่อท้าย URL เพื่อดึงข้อมูลเฉพาะแท็บสินค้า
            const res = await fetch(GOOGLE_SHEET_URL + "?sheet=products");
            const data = await res.json();
            render(data);
        } catch (e) { 
            console.error("โหลดข้อมูลไม่ได้", e); 
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลจาก Google Sheets ได้', 'error');
        }
    }

    // 2. แสดงผลข้อมูล
    function render(products) {
        const body = document.getElementById('stockBody');
        body.innerHTML = products.map((p, i) => `
            <tr>
                <td><img src="${p.image_url}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'"></td>
                <td><strong>${p.name}</strong><br><small>Size: ${p.sizes}</small></td>
                <td>฿${Number(p.price).toLocaleString()}</td>
                <td>${p.stock}</td>
                <td><button class="btn btn-delete" onclick="deleteItem(${i})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
    }

    // 3. เพิ่มสินค้าใหม่
    async function addProduct() {
        const { value: formValues } = await Swal.fire({
            title: 'เพิ่มสินค้าใหม่',
            html: '<input id="name" class="swal2-input" placeholder="ชื่อสินค้า"><input id="price" class="swal2-input" placeholder="ราคา"><input id="img" class="swal2-input" placeholder="ลิงก์รูปภาพ"><input id="stock" class="swal2-input" placeholder="จำนวนสต็อก"><input id="sizes" class="swal2-input" placeholder="ไซส์ (เช่น 38,39,40)">',
            preConfirm: () => ({
                sheet: "products", // บอก Apps Script ว่าจะเพิ่มลงแท็บไหน
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                image_url: document.getElementById('img').value,
                stock: document.getElementById('stock').value,
                sizes: document.getElementById('sizes').value
            })
        });

        if (formValues) {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            await fetch(GOOGLE_SHEET_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(formValues) 
            });
            Swal.fire('สำเร็จ', 'เพิ่มสินค้าลง Google Sheets แล้ว', 'success');
            loadProducts();
        }
    }

    // เรียกโหลดข้อมูลเมื่อเปิดหน้า
    loadProducts();
</script>

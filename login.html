<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ | B.Sneakers</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
  body {
    background: #0f0f0f;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
  }
  
  .login-box {
    background: rgba(26, 26, 26, 0.9);
    padding: 40px;
    border-radius: 24px;
    width: 90%;
    max-width: 400px;
    border: 1px solid #333;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-size: 28px;
    font-weight: bold;
    color: #e60023;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-decoration: none;
    display: block;
  }
  .logo span { color: #fff; }

  h2 { margin-bottom: 25px; font-weight: 400; font-size: 18px; color: #888; }

  form { display: grid; gap: 15px; }

  .input-group { position: relative; text-align: left; }
  .input-group i { 
    position: absolute; 
    left: 15px; 
    top: 50%; 
    transform: translateY(-50%); 
    color: #555; 
    font-size: 18px;
  }

  input {
    width: 100%;
    padding: 14px 14px 14px 45px;
    border-radius: 14px;
    border: 1px solid #333;
    background: #0a0a0a;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
  }

  input:focus { border-color: #e60023; box-shadow: 0 0 12px rgba(230, 0, 35, 0.3); }

  .btn {
    width: 100%;
    padding: 16px;
    margin-top: 10px;
    border: none;
    background: #e60023;
    color: #fff;
    border-radius: 14px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn:hover { background: #ff1a3d; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230, 0, 35, 0.3); }

  .links { margin-top: 25px; font-size: 14px; color: #888; }
  .links p { margin-bottom: 8px; }
  a { color: #e60023; text-decoration: none; cursor: pointer; transition: 0.3s; font-weight: 600; }
  a:hover { color: #ff1a3d; text-decoration: underline; }
  
  .back-home {
    margin-top: 30px;
    display: inline-block;
    color: #555;
    font-size: 13px;
    text-decoration: none;
    transition: 0.3s;
  }
  .back-home:hover { color: #ccc; }
</style>
</head>

<body>

<div class="login-box">
  <a href="index.html" class="logo">B.<span>SNEAKERS</span></a>
  <h2>ยินดีต้อนรับกลับมา</h2>

  <form onsubmit="login(event)">
    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="user" placeholder="ชื่อผู้ใช้" required>
    </div>
    <div class="input-group">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="pass" placeholder="รหัสผ่าน" required>
    </div>
    <button class="btn" type="submit">เข้าสู่ระบบ</button>
  </form>

  <div class="links">
    <p><a onclick="startReset()">ลืมรหัสผ่าน?</a></p>
    <p>ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิกที่นี่</a></p>
  </div>

  <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> กลับไปหน้าหลัก</a>
</div>

<script>
/* ===== สร้างไอดีแอดมินเริ่มต้นถ้ายังไม่มี ===== */
if (!localStorage.getItem("users")) {
    const initialUsers = [{
        username: "admin",
        password: "123", // แก้รหัสตรงนี้ได้ครับ
        email: "admin@bsneakers.com",
        role: "admin"
    }];
    localStorage.setItem("users", JSON.stringify(initialUsers));
}

/* ===== Login Logic ===== */
function login(e){
    e.preventDefault();
    const username = document.getElementById("user").value.trim();
    const password = document.getElementById("pass").value.trim();
    const users = JSON.parse(localStorage.getItem("users")) || [];
    
    const found = users.find(u => u.username === username && u.password === password);

    if(found){
        localStorage.setItem("currentUser", JSON.stringify({
            username: found.username,
            email: found.email,
            role: found.username.toLowerCase() === "admin" ? "admin" : "user" 
        }));
        
        Swal.fire({
            icon: 'success',
            title: 'เข้าสู่ระบบสำเร็จ',
            text: 'ยินดีต้อนรับ ' + username,
            timer: 1500,
            showConfirmButton: false
        }).then(() => {
            window.location.href = "index.html";
        });
    } else {
        Swal.fire({ icon: 'error', title: 'ชื่อผู้ใช้หรือรหัสผ่านผิด' });
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | B.Sneakers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --dark: #0a0a0a; --card-bg: #1a1a1a; --text: #f0f0f0; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--dark); color: var(--text); display: flex; min-height: 100vh; }
        aside { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 20px; position: fixed; height: 100%; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 40px; text-align: center; display: block; }
        .logo span { color: var(--primary); }
        .menu-item { padding: 12px 15px; color: #aaa; background: none; border: none; width: 100%; text-align: left; cursor: pointer; }
        .menu-item.active { background: var(--primary); color: white; border-radius: 8px; }
        main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; margin-top: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">B.<span>SNEAKERS</span></div>
        <div class="menu-item active"><i class="fas fa-boxes-stacked"></i> สต็อกสินค้า</div>
    </aside>
    <main>
        <h1>สต็อกสินค้า</h1>
        <button class="btn-add" onclick="addProduct()"><i class="fas fa-plus"></i> เพิ่มสินค้า</button>
        <div class="card">
            <table>
                <thead><tr><th>ชื่อสินค้า</th><th>ราคา</th><th>สต็อก</th></tr></thead>
                <tbody id="stockBody"><tr><td colspan="3">กำลังโหลดข้อมูล...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        // URL ของคุณจากการ Deploy
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbw9BFnG_IVCN9PIrn4S7csjiVEf3ZuBphdyUjDOGdlmoFieAnZPU5xNCKJNM9wo2UkP/exec"; 

        async function loadProducts() {
            try {
                const res = await fetch(GOOGLE_SHEET_URL + "?sheet=products");
                const data = await res.json();
                const tbody = document.getElementById('stockBody');
                
                // แก้ไขการแสดงผลเพื่อดึงรูปจาก image_url
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>
                            <img src="${p.image_url ? p.image_url.split(',')[0] : 'https://via.placeholder.com/50'}" 
                                 style="width:50px; height:50px; object-fit:cover; border-radius:4px; margin-right:10px;">
                            ${p.name || '-'}
                        </td>
                        <td>฿${Number(p.price || 0).toLocaleString()}</td>
                        <td>${p.stock || 0}</td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('stockBody').innerHTML = '<tr><td colspan="3" style="color:red;">โหลดข้อมูลไม่สำเร็จ</td></tr>';
            }
        }

        async function addProduct() {
            let uploadedImages = [];
            let myWidget = cloudinary.createUploadWidget({
                cloudName: 'droxgzfpi',
                uploadPreset: 'my_sneakers',
                multiple: true,
                maxFiles: 4
            }, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    uploadedImages.push(result.info.secure_url);
                }
            });

            myWidget.open();

            myWidget.on('close', async () => {
                if (uploadedImages.length > 0) {
                    const { value: formValues } = await Swal.fire({
                        title: 'กรอกรายละเอียด',
                        html: '<input id="name" class="swal2-input" placeholder="ชื่อ"><input id="price" class="swal2-input" placeholder="ราคา">',
                        preConfirm: () => ({
                            sheet: "products",
                            name: document.getElementById('name').value,
                            price: document.getElementById('price').value,
                            image_url: uploadedImages.join(','),
                            stock: 1,
                            sizes: "40"
                        })
                    });

                    if (formValues) {
                        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                        await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formValues) });
                        Swal.fire('สำเร็จ', 'เพิ่มสินค้าแล้ว', 'success');
                        loadProducts();
                    }
                }
            });
        }

        loadProducts();
    </script>
</body>
</html>

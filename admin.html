<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | B.Sneakers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <style>
        /* (CSS เดิมของคุณยังคงใช้ได้ครับ) */
        :root { --primary: #e60023; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; padding: 20px; font-family: 'Kanit', sans-serif; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <button class="btn" onclick="addProduct()">เพิ่มสินค้าใหม่</button>
    <div id="status"></div>

    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbylpGWJGupVu4BGwdYY7Riq7HbjxtwQdDDDdE9Q3BfU9PBzl99bfVZDvaBH-3g-yaUM/exec";

        async function addProduct() {
            let uploadedImages = [];
            
            // 1. เปิดหน้าต่างอัปโหลด
            let myWidget = cloudinary.createUploadWidget({
                cloudName: 'droxgzfpi', // ชื่อ Cloud Name จาก Dashboard ของคุณ
                uploadPreset: 'my_sneakers', // ชื่อ Upload Preset ที่คุณเพิ่งสร้าง
                multiple: true,
                maxFiles: 4
            }, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    uploadedImages.push(result.info.secure_url);
                }
            });

            myWidget.open();

            // 2. เมื่อปิดหน้าต่างอัปโหลด ให้ถามข้อมูลอื่นๆ
            myWidget.on('close', async () => {
                if (uploadedImages.length > 0) {
                    const { value: formValues } = await Swal.fire({
                        title: 'กรอกรายละเอียดสินค้า',
                        html: '<input id="name" class="swal2-input" placeholder="ชื่อสินค้า"><input id="price" class="swal2-input" placeholder="ราคา"><input id="stock" class="swal2-input" placeholder="สต็อก"><input id="sizes" class="swal2-input" placeholder="ไซส์">',
                        preConfirm: () => ({
                            sheet: "products",
                            id: Date.now(), // สร้าง ID อัตโนมัติ
                            name: document.getElementById('name').value,
                            price: document.getElementById('price').value,
                            image_url: uploadedImages.join(','), // รวม URL เป็น string
                            stock: document.getElementById('stock').value,
                            sizes: document.getElementById('sizes').value
                        })
                    });

                    if (formValues) {
                        Swal.fire('กำลังบันทึก...', '', 'info');
                        await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formValues) });
                        Swal.fire('สำเร็จ', 'เพิ่มสินค้าพร้อมรูปภาพแล้ว', 'success');
                    }
                }
            });
        }
    </script>
</body>
</html>
